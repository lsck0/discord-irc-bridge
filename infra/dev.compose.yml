services:
  ircd:
    container_name: bridge-dev-ircd
    image: inspircd/inspircd-docker
    environment:
      - INSP_NET_NAME=discord-irc-bridge
      - INSP_NET_SUFFIX=.dev.local
      - INSP_CONNECT_PASSWORD=password
      - INSP_ENABLE_DNSBL=no
    ports:
      - 6667:6667

  bridge:
    container_name: bridge-dev-bridge
    build:
      context: ../
      dockerfile: .docker/dev.Dockerfile
    env_file:
      - ./env/dev.env
    depends_on:
      - ircd
    develop:
      watch:
        - action: rebuild
          path: ../.docker/dev.Dockerfile
        - action: rebuild
          path: ../Cargo.toml
        - action: sync
          path: ../src/
          target: /app/src/
